services:
  - type: web
    name: ogrodzenia-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: PORT
        value: 8000
